<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-commerce Navbar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">


</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <!-- Brand Logo/Name -->
      <a class="navbar-brand" href="#">
        <img src="logo.png" alt="Brand Logo"> YourBrand
      </a>

      <!-- Toggle Button for Mobile View -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navbar Links and Search Bar -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <!-- Home -->
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>

          <!-- Products Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Products
            </a>
            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
              <li><a class="dropdown-item" href="https://up.yimg.com/ib/th/id/OIP.g87f3kqf0JPuTXFNXmUEXAHaEo?pid=Api&rs=1&c=1&qlt=95&w=152&h=95">Category 1</a></li>
              <li><a class="dropdown-item" href="#">Category 2</a></li>
              <li><a class="dropdown-item" href="#">Category 3</a></li>
              <li><a class="dropdown-item" href="#">Category 4</a></li>

            </ul>
          </li>
       

          <!-- About -->
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>

          <!-- Contact -->
          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
        </ul>

        <!-- Cart and Wishlist Icons -->
        <div class="cart-wishlist-icons">
            <i class="bi bi-heart" title="Wishlist"></i>
            <i class="bi bi-cart" title="Cart" data-bs-toggle="modal" data-bs-target="#cartModal"></i>
            <!-- Search Icon -->
            <i class="bi bi-search search-btn" data-bs-toggle="modal" data-bs-target="#searchModal" title="Search"></i>
          </div>
        </div>
      </div>
    </nav>

  <!-- Search Modal -->
  <div class="modal fade" id="searchModal" tabindex="-1" aria-labelledby="searchModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="searchModalLabel">Search Products</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- Search Bar Input -->
          <input type="text" class="form-control search-input" id="searchInput" placeholder="Search for products..." onkeyup="searchProducts()" />
          <ul id="searchResults" class="list-group mt-2"></ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Cart Modal (for example) -->
  <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="cartModalLabel">Your Cart</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Your cart is empty.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
  
</body>
</html>
